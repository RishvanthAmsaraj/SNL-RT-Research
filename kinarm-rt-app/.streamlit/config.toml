# Dual theme: bright white light mode and OLED-black dark mode, blue accents.
# No `base` is set, so the app follows your OS appearance automatically (Auto).
# You can still force Light or Dark via the ☰ menu -> Settings -> Theme.

[theme]
font = "sans-serif"

[theme.light]
primaryColor = "#2f6bff"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#eef3ff"
textColor = "#0f1729"
borderColor = "#e3e9f5"

[theme.dark]
primaryColor = "#4d8bff"
backgroundColor = "#000000"
secondaryBackgroundColor = "#0c1018"
textColor = "#e7ecf5"
borderColor = "#1c2230"

[server]
maxUploadSize = 500

[browser]
gatherUsageStats = false
